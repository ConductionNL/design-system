<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" width="210mm" height="297mm" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Quotation honeycomb watermark">
  <title>Quotation watermark, smaller hexes, logo in top-right, payoff zone clear</title>
  <!-- R=14 grid, drawn-R=8. Hex bounding box 13.86 x 16 mm.
       The brand-block logo on the quotation page uses an avatar
       SVG sized to the same 13.86 x 16 mm, so logo and pattern
       hexes are true-equal in size and drawn from the same
       primitive. Rows behind the outcome block (y between 50
       and 130) are skipped so the "wat je krijgt" panel sits
       on a clean ground. -->
