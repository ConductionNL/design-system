name = "conduction-vanity-redirects"
main = "worker.js"
compatibility_date = "2026-04-01"

# Vanity domains that 301-redirect to the canonical site at conduction.nl.
# Add a new route here when adding a third vanity host; also update
# VANITY_TO_SECTION in worker.js.
routes = [
  { pattern = "connext.conduction.nl/*",       zone_name = "conduction.nl" },
  { pattern = "commonground.conduction.nl/*",  zone_name = "conduction.nl" },
]
