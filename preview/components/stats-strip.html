<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stats strip — ConNext Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { margin: 0; background: white; font-family: var(--conduction-typography-font-family-body); }

  .strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    padding: 40px 64px;
    border-top: 1px solid var(--c-cobalt-100);
    background: var(--c-cobalt-50);
  }
  .strip .stat .num { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; color: var(--c-blue-cobalt); }
  .strip .stat .lbl { font-size: 13px; color: var(--c-cobalt-700); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>

<section class="strip">
  <div class="stat"><div class="num">12</div><div class="lbl">apps in the ecosystem,<br>all open-source</div></div>
  <div class="stat"><div class="num">2 min</div><div class="lbl">from app store install<br>to working solution</div></div>
  <div class="stat"><div class="num">€0</div><div class="lbl">for the apps —<br>support is optional</div></div>
  <div class="stat"><div class="num">MIT</div><div class="lbl">licensed, with no<br>vendor lock-in</div></div>
</section>

</body>
</html>
