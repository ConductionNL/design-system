<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 17.3205 30" width="17.3205" height="30" role="img" aria-label="Seamless honeycomb mesh, white on transparent">
  <title>Seamless honeycomb mesh, white hex outlines on transparent — touching cells, for dark (cobalt) slide surfaces</title>
  <!-- Pointy-top hexes, vertex radius R=10, drawn edge-to-edge (no gaps).
       Column pitch = √3·R = 17.3205, row pitch = 1.5·R = 15, odd rows
       offset by half a column. The tile (17.3205 x 30 = two rows) repeats
       seamlessly via CSS background-repeat. Five hexes: four corners +
       centre give every in-tile piece. -->
  <g fill="none" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.5">
    <polygon points="0,-10 8.6603,-5 8.6603,5 0,10 -8.6603,5 -8.6603,-5"/>
    <polygon points="17.3205,-10 25.9808,-5 25.9808,5 17.3205,10 8.6603,5 8.6603,-5"/>
    <polygon points="8.6603,5 17.3205,10 17.3205,20 8.6603,25 0,20 0,10"/>
    <polygon points="0,20 8.6603,25 8.6603,35 0,40 -8.6603,35 -8.6603,25"/>
    <polygon points="17.3205,20 25.9808,25 25.9808,35 17.3205,40 8.6603,35 8.6603,25"/>
  </g>
</svg>
