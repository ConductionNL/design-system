# =============================================================
# GitHub Pages deploy: publishes the brand kit at preview/ to the
# design-system Pages site (identity.conduction.nl).
#
# Replaces the prior "build sites/www and layer preview/" workflow.
# sites/www was extracted to ConductionNL/conduction-website (which
# now serves www.conduction.nl); this repo's Pages site is now solely
# the brand identity reference — every component / page / specimen
# from preview/, plus the brand assets and tokens at the repo root.
#
# Pages source must be set to "GitHub Actions" in the repo settings.
# Custom domain is set to identity.conduction.nl via the CNAME file
# generated below.
# =============================================================

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'preview/**'
      - 'brand/**'
      - 'diagrams/**'
      - 'tokens.css'
      - 'typography.css'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Assemble the Pages artifact. preview/ is the root (so the kit
      # specimens are reachable at identity.conduction.nl/<page>.html);
      # brand/, diagrams/, tokens.css, typography.css layer in beside
      # them so MDX / HTML in preview/ that imports the brand assets
      # via absolute paths still resolves.
      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp -r preview/. _site/
          mkdir -p _site/brand
          cp -r brand/. _site/brand/ 2>/dev/null || true
          mkdir -p _site/diagrams
          cp -r diagrams/dist/. _site/diagrams/ 2>/dev/null || true
          for f in tokens.css typography.css; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done
          # Custom domain claim
          echo "identity.conduction.nl" > _site/CNAME
          # Disable Jekyll so files starting with _ are served as-is
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
