name: Publish package

# Auto-publish @conduction/docusaurus-preset to npm on every push to main,
# IF the version in docusaurus-preset/package.json differs from the version
# already on the registry. To release: bump the version field, commit, push.
# The workflow detects the bump and publishes; pushes that don't bump the
# version are no-ops.
#
# Authentication uses npm's Trusted Publisher (OIDC) flow: the runner mints
# a short-lived ID token, npm validates the {repo, workflow} claim against
# its trust config, and issues a one-shot publish token. No NPM_TOKEN
# secret to rotate. Provenance attestations are signed automatically.
#
# Trust config is set on the npm package settings page; it expects this
# workflow to live at the path `.github/workflows/publish-packages.yml`
# in `ConductionNL/design-system`. If you rename or move this file, update
# the npm Trusted Publisher config to match.
#
# A tag push (`v*`) and a manual workflow_dispatch (with optional dry-run)
# are also accepted, mostly for explicit republishes and emergency holds.
#
# The diagrams runtime (cn-hex, cn-platform, etc.) ships inside the same
# package under the /diagrams subpath, so there is exactly one release.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for npm Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      # Trusted Publisher OIDC requires npm CLI >= 11.5.1 and Node >= 22.14.
      # Node 22 ships npm 10.x, so we explicitly upgrade npm afterwards.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a Trusted-Publisher-capable version
        run: npm install -g npm@latest

      # `npm install` rather than `npm ci`, because package-lock.json is
      # gitignored (the design-system monorepo doesn't pin transitive
      # versions). The publish step itself does not need node_modules,
      # but a clean install warms the workspace resolution that
      # `npm publish --workspace` relies on.
      - run: npm install --no-audit --no-fund

      - name: Check whether version on main is already published
        id: version
        run: |
          LOCAL=$(node -p "require('./docusaurus-preset/package.json').version")
          PUBLISHED=$(npm view @conduction/docusaurus-preset version 2>/dev/null || echo "none")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $LOCAL already on npm; skipping publish."
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Local $LOCAL differs from published $PUBLISHED; will publish."
          fi

      - name: Publish @conduction/docusaurus-preset
        if: steps.version.outputs.match == 'false'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @conduction/docusaurus-preset --access public --dry-run
          else
            npm publish --workspace @conduction/docusaurus-preset --access public --provenance
          fi
