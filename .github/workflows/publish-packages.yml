name: Publish package

# Auto-publish @conduction/docusaurus-preset to npm via semantic-release.
#
# Trigger: every push to main. semantic-release reads conventional-commit
# messages since the last `docusaurus-preset-v*` tag and decides what to
# release:
#   feat:        -> minor bump
#   fix:         -> patch bump
#   feat!: / BREAKING CHANGE: footer -> major bump
#   anything else -> no release
#
# Path filtering: `semantic-release-monorepo` (configured via `extends` in
# docusaurus-preset/.releaserc.json) restricts the commit scan to commits
# that touched files inside docusaurus-preset/. Edits to preview/, sites/,
# brand/, etc. never trigger a release.
#
# Authentication: npm Trusted Publisher (OIDC). The runner mints a
# short-lived ID token, npm validates the {repo, workflow} claim against
# its trust config, and issues a one-shot publish token. No NPM_TOKEN
# secret to rotate. Provenance attestations are signed automatically
# (NPM_CONFIG_PROVENANCE=true).
#
# Why @semantic-release/exec instead of @semantic-release/npm publishing
# directly: as of v12.0.2, @semantic-release/npm has no OIDC awareness and
# its `verify-auth` step refuses to run without an NPM_TOKEN. We set
# `npmPublish: false` on that plugin (which only does the in-place version
# bump in package.json) and run the OIDC publish via @semantic-release/exec
# in the same publish lifecycle. The plugin invokes `npx -y npm@latest`
# because Node 22's bundled npm 10.9 is too old for OIDC (need >=11.5.1)
# and an in-place `npm install -g npm@latest` hits a promise-retry
# MODULE_NOT_FOUND race; npx sidesteps both.
#
# Trust config on npmjs.com expects this workflow at the path
# `.github/workflows/publish-packages.yml` in `ConductionNL/design-system`.
# If you rename or move this file, update the npm Trusted Publisher config.
#
# Tag format is `docusaurus-preset-v${version}` (semantic-release-monorepo
# default), so any future second package can ship from the same repo
# without tag clashes.

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release --dry-run only (no publish, no tag, no release)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # @semantic-release/github creates the GitHub release + tag via API
      id-token: write    # npm Trusted Publisher (OIDC) + provenance attestation
    env:
      NPM_CONFIG_PROVENANCE: 'true'
    steps:
      # semantic-release walks every commit since the last tag, so we need
      # the full history (default checkout depth is 1).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm install --no-audit --no-fund

      - name: semantic-release
        working-directory: docusaurus-preset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi
