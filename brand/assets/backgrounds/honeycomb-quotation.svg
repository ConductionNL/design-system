    <polygon id="hx" points="0,-8 6.928,-4 6.928,4 0,8 -6.928,4 -6.928,-4"/>
  </defs>

  <!-- Bulk hexes: cobalt-100 outline, solid stroke. -->
  <g fill="none" stroke="#DCE3F0" stroke-width="0.4">
    <!-- Row 0 (type A, y=14) — full row, logo cell removed -->
    <use href="#hx" x="12.124"  y="14"/>
    <use href="#hx" x="36.373"  y="14"/>
    <use href="#hx" x="60.622"  y="14"/>
    <use href="#hx" x="84.871"  y="14"/>
    <use href="#hx" x="109.12"  y="14"/>
    <use href="#hx" x="133.37"  y="14"/>
    <use href="#hx" x="157.62"  y="14"/>
    <use href="#hx" x="181.87"  y="14"/>

