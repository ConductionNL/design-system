<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" width="210mm" height="297mm" role="img" aria-label="Quotation honeycomb watermark">
  <title>Quotation watermark, R=14 grid centred on the brand-block logo</title>
  <!-- R=14 grid, drawn-R=8. Hex bounding 13.86 x 16 mm, exactly
       the same as the brand-block logo container in the page CSS.
       The grid is shifted so a type-A hex centre lands at
       (26.93, 26) mm, the centre of the brand-block logo's
       18mm padding-top + 20mm padding-left + 13.86/16 size box.
       That makes the logo render IN a hex slot of the pattern,
       not overlaid on top of it.

       Empty zone for the outcome block: rows y=47, 68, 89 are
       skipped so the cobalt-50 "wat je krijgt" panel sits on a
       clean ground. The logo-position hex (26.93, 26) is also
       skipped because the page renders the brand-block logo
       there with the same drawing primitives. -->
  <defs>
    <polygon id="hx" points="0,-8 6.928,-4 6.928,4 0,8 -6.928,4 -6.928,-4"/>
  </defs>

  <g fill="none" stroke="#DCE3F0" stroke-width="0.4">
    <!-- Row 0 (type A, y=26) — logo position cx=26.93 SKIPPED -->
    <use href="#hx" x="2.68"   y="26"/>
    <use href="#hx" x="51.18"  y="26"/>
    <use href="#hx" x="75.43"  y="26"/>
    <use href="#hx" x="99.68"  y="26"/>
    <use href="#hx" x="123.93" y="26"/>
    <use href="#hx" x="148.18" y="26"/>
    <use href="#hx" x="172.43" y="26"/>
    <use href="#hx" x="196.68" y="26"/>

    <!-- Rows y=47, 68, 89 SKIPPED — outcome block. -->

