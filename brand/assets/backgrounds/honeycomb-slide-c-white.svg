<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="none" width="1280" height="720" role="img" aria-label="Honeycomb slide background, white Conduction C cell">
  <title>Full-slide cobalt honeycomb with one cell rendered as the white-bordered Conduction mark (no orange). Mesh and mark live in one SVG, so the C is always exactly one honeycomb cell.</title>
  <defs>
    <polygon id="hx" points="0,-58.89 51,-29.445 51,29.445 0,58.89 -51,29.445 -51,-29.445"/>
    <pattern id="mesh" x="0" y="0" width="102" height="176.67" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.5">
        <use href="#hx" x="0" y="0"/>
        <use href="#hx" x="102" y="0"/>
        <use href="#hx" x="51" y="88.335"/>
        <use href="#hx" x="0" y="176.67"/>
        <use href="#hx" x="102" y="176.67"/>
      </g>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="#21468B"/>
  <rect width="1280" height="720" fill="url(#mesh)"/>
  <!-- One cell as the white Conduction mark, bottom-right (even cell 1122,530.01) -->
  <g transform="translate(1122,530.01)">
    <path fill="#FFFFFF" fill-rule="evenodd" transform="scale(0.5889)" d="M0,-100 L86.6,-50 L86.6,50 L0,100 L-86.6,50 L-86.6,-50 Z M0,-74.5 L64.5,-37.3 L64.5,37.3 L0,74.5 L-64.5,37.3 L-64.5,-37.3 Z"/>
    <g transform="scale(0.483)">
      <polygon fill="#FFFFFF" points="-0.2,-25.2 20.1,-13.5 43.7,-27.1 -0.2,-52.4 -45.6,-26.2 -45.6,26.2 -0.2,52.4 43.7,27.1 20.1,13.5 -0.2,25.2 -22,12.6 -22,-12.6"/>
    </g>
  </g>
</svg>
