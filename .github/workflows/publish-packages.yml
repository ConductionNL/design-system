name: Publish packages

# Tag-triggered npm publish for the Conduction design-system packages.
#
# Usage: bump the version in docusaurus-preset/package.json (and diagrams/
# if it changed), commit, then `git tag v0.1.0 && git push origin v0.1.0`.
# This workflow then publishes both packages to npm under the @conduction
# scope.
#
# Diagrams publishes first because @conduction/docusaurus-preset declares
# it as a runtime dependency and consumers will resolve both when they
# install the preset.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only'
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish @conduction/diagrams
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @conduction/diagrams --access public --dry-run
          else
            npm publish --workspace @conduction/diagrams --access public
          fi

      - name: Publish @conduction/docusaurus-preset
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @conduction/docusaurus-preset --access public --dry-run
          else
            npm publish --workspace @conduction/docusaurus-preset --access public
          fi
