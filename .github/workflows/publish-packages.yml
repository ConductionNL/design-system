name: Publish package

# Auto-publish @conduction/docusaurus-preset to npm on every push to main,
# IF the version in docusaurus-preset/package.json differs from the version
# already on the registry. To release: bump the version field, commit, push.
# The workflow detects the bump and publishes; pushes that don't bump the
# version are no-ops.
#
# A tag push (`v*`) and a manual workflow_dispatch (with optional dry-run)
# are also accepted, mostly for explicit republishes and emergency holds.
#
# The diagrams runtime (cn-hex, cn-platform, etc.) ships inside the same
# package under the /diagrams subpath, so there is exactly one release.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Check whether version on main is already published
        id: version
        run: |
          LOCAL=$(node -p "require('./docusaurus-preset/package.json').version")
          PUBLISHED=$(npm view @conduction/docusaurus-preset version 2>/dev/null || echo "none")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $LOCAL already on npm; skipping publish."
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Local $LOCAL differs from published $PUBLISHED; will publish."
          fi

      - name: Publish @conduction/docusaurus-preset
        if: steps.version.outputs.match == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @conduction/docusaurus-preset --access public --dry-run
          else
            npm publish --workspace @conduction/docusaurus-preset --access public
          fi
