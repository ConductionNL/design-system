<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" width="210mm" height="297mm" preserveAspectRatio="xMidYMid meet" role="img" aria-label="A4 cover page template">
  <title>Cover page · A4 portrait</title>
  <rect x="0" y="0" width="210" height="297" fill="#FFFFFF"/>
  <!-- Cobalt header band -->
  <rect x="0" y="0" width="210" height="120" fill="#21468B"/>
  <!-- Hex motif accent -->
  <polygon points="170,18 195,32 195,60 170,74 145,60 145,32" fill="#F36C21"/>
  <polygon points="20,86 35,94 35,112 20,120 5,112 5,94" fill="#FFFFFF" fill-opacity="0.15"/>
  <!-- Title placeholder -->
  <text x="20" y="62" font-family="Figtree, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="0.08em">REPORT TITLE</text>
  <text x="20" y="86" font-family="Figtree, system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">{{ Title goes here }}</text>
  <text x="20" y="106" font-family="Figtree, system-ui, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" fill-opacity="0.8">{{ Subtitle / one-line summary }}</text>
  <!-- Body summary block -->
  <text x="20" y="160" font-family="Figtree, system-ui, sans-serif" font-size="9" font-weight="500" fill="#4D69A4" letter-spacing="0.08em">SUMMARY</text>
  <line x1="20" y1="166" x2="190" y2="166" stroke="#DCE3F0" stroke-width="0.5"/>
  <text x="20" y="180" font-family="Figtree, system-ui, sans-serif" font-size="10" fill="#152D5C">{{ Lead-in paragraph. Two sentences max. }}</text>
  <!-- Footer -->
  <line x1="20" y1="270" x2="190" y2="270" stroke="#DCE3F0" stroke-width="0.5"/>
  <text x="20" y="282" font-family="IBM Plex Mono, monospace" font-size="7" fill="#4D69A4" letter-spacing="0.06em">CONDUCTION &middot; {{ DATE }} &middot; {{ DOC ID }}</text>
  <text x="190" y="282" font-family="IBM Plex Mono, monospace" font-size="7" fill="#4D69A4" letter-spacing="0.06em" text-anchor="end">conduction.nl</text>
</svg>
