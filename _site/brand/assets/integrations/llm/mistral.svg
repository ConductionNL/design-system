<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
  <!-- Stacked horizontal bars in a stair pattern, representational of Mistral's mark. -->
  <rect x="2" y="3"  width="20" height="3" rx="0.5"/>
  <rect x="2" y="8"  width="14" height="3" rx="0.5" opacity="0.75"/>
  <rect x="2" y="13" width="20" height="3" rx="0.5" opacity="0.6"/>
  <rect x="2" y="18" width="14" height="3" rx="0.5" opacity="0.4"/>
</svg>
