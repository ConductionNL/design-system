<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 600" width="210mm" height="600mm" role="img" aria-label="Honeycomb page watermark">
  <title>Page-wide honeycomb watermark, gray (cobalt-100), no logo cell</title>
  <!-- Same R=14 grid, drawn-R=8 hexes as the quotation/invoice
       watermark, but without an embedded logo at (26.93, 26).
       Gray tone via solid cobalt-100 (#DCE3F0) strokes — reads
       on white the same way the .conduction-bg.on-light theme
       does on cobalt-50, like a veil rather than a pattern.
       Tall viewBox (600mm) so the comb covers content overflow. -->
  <defs>
    <polygon id="hx" points="0,-8 6.928,-4 6.928,4 0,8 -6.928,4 -6.928,-4"/>
    <pattern id="hexgrid" x="11.34" y="26" width="15.59" height="27" patternUnits="userSpaceOnUse">
      <use href="#hx" x="0" y="0" fill="none" stroke="#DCE3F0" stroke-width="0.4"/>
      <use href="#hx" x="15.59" y="0" fill="none" stroke="#DCE3F0" stroke-width="0.4"/>
      <use href="#hx" x="0" y="27" fill="none" stroke="#DCE3F0" stroke-width="0.4"/>
      <use href="#hx" x="15.59" y="27" fill="none" stroke="#DCE3F0" stroke-width="0.4"/>
      <use href="#hx" x="7.795" y="13.5" fill="none" stroke="#DCE3F0" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="210" height="600" fill="url(#hexgrid)"/>
</svg>
