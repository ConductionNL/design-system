<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Clients Marquee, ConNext Website</title>

<style>
  body { margin: 0; background: white; padding: 80px 64px; }

  .clients-section { max-width: 1280px; margin: 0 auto; }

  .clients-eyebrow {
    display: inline-flex; align-items: center; gap: var(--space-3);
    font-family: var(--conduction-typography-font-family-code);
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--c-blue-cobalt);
    font-weight: 600;
    margin-bottom: var(--space-5);
  }
  .clients-eyebrow .h {
    width: 14px; height: 16px;
    background: var(--c-orange-knvb);
    clip-path: var(--hex-pointy-top);
  }

  .clients-section h2 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    max-width: 14ch;
    margin: 0 0 var(--space-5);
    color: var(--c-cobalt-900);
  }
  .clients-section .lede {
    font-size: 18px;
    color: var(--c-cobalt-700);
    line-height: 1.5;
    max-width: 50ch;
    margin: 0 0 var(--space-10);
  }

  /* === Marquee === */
  /* Hexes are spawned, drifted, and culled by the runtime in
     ../../docusaurus-preset/static/lib/clients-flow.js. Each row is
     a static relative container; .hex children are absolutely
     positioned and animated via inline transform. */
  .marquee {
    --hex-w: 120px;
    --hex-h: 138.56px;     /* hex-w * 1.1547 (pointy-top ratio) */
    --gap: 8px;            /* breathing room between hexes */
    /* Isotropic gap: vertical pitch scales with --gap so the visible
       gap perpendicular to slanted hex edges matches the horizontal
       gap between flat sides. */
    --hex-overlap: calc(var(--hex-h) - (var(--hex-w) + var(--gap)) * 0.866);
    --offset: calc((var(--hex-w) + var(--gap)) / 2);
    position: relative;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
            mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    padding: var(--space-4) 0;
  }

  .row {
    position: relative;
    overflow: hidden;
    height: var(--hex-h);
    margin-top: calc(var(--hex-overlap) * -1);
  }
  .row:first-child { margin-top: 0; }
  /* Row 2 stagger is applied by the runtime via translateX on each
     spawned hex (default idx === 1 starts cursorX at half-pitch).
     No CSS offset on the row itself: any padding/margin would
     inflate the row's bounding rect, and the runtime uses that for
     spawn arithmetic — all three rows must measure equal widths
     so they stay in lockstep. */

  /* === Hex tile === */
  .hex {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--hex-w);
    height: var(--hex-h);
    background: white;
    clip-path: var(--hex-pointy-top);
    display: grid;
    place-items: center;
  }
  /* faint cobalt outline via inset shadow inside the clip */
  .hex::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--c-cobalt-50);
    clip-path: var(--hex-pointy-top);
    z-index: 0;
  }
  .hex::after {
    content: "";
    position: absolute; inset: 1.5px;
    background: white;
    clip-path: var(--hex-pointy-top);
    z-index: 1;
  }
  .hex img {
    position: relative;
    z-index: 2;
    max-width: 60%;
    max-height: 50%;
    object-fit: contain;
    filter: grayscale(1) opacity(0.55);
    transition: filter 200ms ease;
  }
  .hex:hover img,
  .hex:focus-within img {
    filter: grayscale(0) opacity(1);
  }

  /* Mobile: collapse to one lane */
  @media (max-width: 720px) {
    body { padding: 40px 16px; }
    .clients-section h2 { font-size: 36px; }
    .marquee { --hex-w: 88px; --hex-h: 101.6px; --gap: 6px; }
    .row-2, .row-3 { display: none; }
  }
</style>
</head>
