<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cookie CLI, Conduction Design System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../../typography.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --term-bg: #0A0F1A;
    --term-fg: #C9D4E5;
    --term-fg-dim: #5F6E86;
    --term-cobalt: #6892D9;
    --term-green: #5FE39A;
  }
  body {
    margin: 0;
    background: var(--c-cobalt-50);
    padding: 32px;
    font-family: var(--conduction-typography-font-family-body);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .term {
    background: var(--term-bg);
    color: var(--term-fg);
    border: 1px solid #1A2540;
    border-radius: 8px;
    box-shadow:
      0 0 0 1px rgba(33, 70, 139, 0.12),
      0 24px 64px -16px rgba(10, 23, 47, 0.45),
      inset 0 0 80px rgba(0, 0, 0, 0.4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px;
    line-height: 1.55;
    width: 100%;
    max-width: 640px;
    overflow: hidden;
  }
  .term-bar {
    background: #060912;
    padding: 8px 14px;
    border-bottom: 1px solid #1A2540;
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: var(--term-fg-dim);
  }
  .term-bar .dots { display: flex; gap: 6px; }
  .term-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-bar .r { background: #FF6B7A; }
  .term-bar .y { background: #F7C76F; }
  .term-bar .g { background: var(--term-green); }
  .term-bar .title { flex: 1; text-align: center; }
  .term-bar .title b { color: var(--term-fg); }
  .term-body { padding: 18px 20px; }
  .prompt { color: var(--term-fg); margin: 6px 0; }
  .prompt .user { color: var(--term-green); }
  .prompt .host { color: var(--term-cobalt); }
  .prompt .sigil, .prompt .path { color: var(--term-fg-dim); }
  .prompt .cmd { color: var(--term-fg); }
  .cmt { color: var(--term-fg-dim); }
  .opts { list-style: none; padding: 0; margin: 8px 0; display: flex; flex-direction: column; gap: 4px; }
  .opts li { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .opts .key { color: var(--term-fg-dim); }
  .opts .check { color: var(--term-fg-dim); width: 12px; }
  .opts li.on .check { color: var(--term-green); }
  .opts .label { color: var(--term-fg); flex: 1; }
  .opts .tag {
    font-size: 10px; color: var(--term-fg-dim);
    border: 1px solid #1A2540;
    padding: 1px 7px;
    border-radius: 3px;
  }
  .actions-row {
    display: flex; gap: 8px; margin-top: 14px;
    padding-top: 12px; border-top: 1px solid #1A2540;
  }
  .term-btn {
    background: transparent;
    color: var(--term-fg);
    border: 1px solid #1A2540;
    padding: 6px 12px;
    font-family: inherit; font-size: 12px;
    border-radius: 3px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .term-btn .key {
    background: #1A2540;
    color: var(--term-cobalt);
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 10px;
  }
  .term-btn.primary { background: var(--c-orange-knvb); color: white; border-color: var(--c-orange-knvb); }
  .term-btn.primary .key { background: rgba(0,0,0,0.2); color: white; }
</style>
</head>
<body>

<div class="term">
  <div class="term-bar">
    <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <div class="title">— <b>conduction.nl</b> · cookie-consent — bash —</div>
  </div>
  <div class="term-body">
    <div class="prompt"><span class="user">you</span><span class="sigil">@</span><span class="host">conduction.nl</span><span class="sigil">:</span><span class="path">~</span><span class="sigil">$</span> <span class="cmd">cat ./cookies.toml</span></div>
    <p class="cmt" style="margin: 6px 0;"># Pick what you're OK with. Essential cookies are required.</p>
    <ul class="opts">
      <li class="on"><span class="key">[1]</span><span class="check">✓</span><span class="label">essential</span><span class="tag">required</span></li>
      <li class="on"><span class="key">[2]</span><span class="check">✓</span><span class="label">analytics</span><span class="tag">opt-in</span></li>
      <li><span class="key">[3]</span><span class="check">☐</span><span class="label">preferences</span><span class="tag">opt-in</span></li>
      <li><span class="key">[4]</span><span class="check">☐</span><span class="label">marketing</span><span class="tag">opt-in</span></li>
    </ul>
    <div class="actions-row">
      <button class="term-btn primary"><span class="key">A</span>Accept all</button>
      <button class="term-btn"><span class="key">S</span>Save selection</button>
      <button class="term-btn"><span class="key">R</span>Reject non-essential</button>
    </div>
  </div>
</div>

</body>
</html>
