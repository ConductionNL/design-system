# =============================================================
# GitHub Pages deploy: builds the Docusaurus site at sites/www/
# and publishes it. The preview/ kit and the brand asset folders
# at the repo root are layered into the same artifact so they
# stay browsable at the same custom domain (preview/, brand/, etc.).
#
# Pages source must be set to "GitHub Actions" in the repo settings.
# Custom domain is claimed by sites/www/static/CNAME (Docusaurus
# copies that to build/CNAME during the build step).
# =============================================================

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # package-lock.json is gitignored in this repo, so use install
      # rather than ci. The build is deterministic enough for the
      # marketing site; pin if needed via the engines field later.
      - run: npm install

      - name: Build Docusaurus site
        run: npm run build

      # Layer the preview kit and the brand asset folders on top of
      # the Docusaurus build, so the kit stays browsable at the same
      # host (e.g. connext.conduction.nl/preview/, /brand/, /diagrams/).
      # The Docusaurus site owns the root index. Each layered folder
      # lives at its own path; collisions resolve in favour of the
      # Docusaurus build.
      - name: Layer preview kit + brand assets onto build output
        run: |
          mkdir -p sites/www/build/preview
          cp -r preview/. sites/www/build/preview/ 2>/dev/null || true
          mkdir -p sites/www/build/brand
          cp -r brand/. sites/www/build/brand/ 2>/dev/null || true
          mkdir -p sites/www/build/diagrams
          cp -r diagrams/dist/. sites/www/build/diagrams/ 2>/dev/null || true
          # Static-only files at the repo root (tokens.css, typography.css,
          # any standalone preview index). Don't fail if they don't exist.
          for f in tokens.css typography.css; do
            [ -f "$f" ] && cp "$f" sites/www/build/ || true
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: sites/www/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
