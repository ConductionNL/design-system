<style>
  body { margin: 0; background: white; padding: 80px 64px; }

  .clients-section { max-width: 1280px; margin: 0 auto; }

  .clients-eyebrow {
    display: inline-flex; align-items: center; gap: var(--space-3);
    font-family: var(--conduction-typography-font-family-code);
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--c-blue-cobalt);
    font-weight: 600;
    margin-bottom: var(--space-5);
  }
  .clients-eyebrow .h {
    width: 14px; height: 16px;
    background: var(--c-orange-knvb);
    clip-path: var(--hex-pointy-top);
  }

  .clients-section h2 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    max-width: 14ch;
    margin: 0 0 var(--space-5);
    color: var(--c-cobalt-900);
  }
  .clients-section .lede {
    font-size: 18px;
    color: var(--c-cobalt-700);
    line-height: 1.5;
    max-width: 50ch;
    margin: 0 0 var(--space-10);
  }

  /* === Marquee === */
  .marquee {
    --hex-w: 120px;
    --hex-h: 138.56px;     /* hex-w * 1.1547 (pointy-top ratio) */
    --hex-overlap: 34.64px; /* hex-h * 0.25 — proper honeycomb tessellation */
    --gap: 4px;            /* tight horizontal breathing so the wall reads as one honeycomb */
    --row-h: calc(var(--hex-h) - var(--hex-overlap)); /* 103.96 */
    --offset: calc((var(--hex-w) + var(--gap)) / 2);
    position: relative;
    overflow: hidden;
    /* Soft fade at left/right edges */
    -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
            mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    padding: var(--space-4) 0;
  }

  .row {
    overflow: hidden;
    height: var(--hex-h);
    margin-top: calc(var(--hex-overlap) * -1);
  }
  .row:first-child { margin-top: 0; }
  .row-2 .track { padding-left: var(--offset); }    /* honeycomb stagger */

  .track {
    display: inline-flex;
    gap: var(--gap);
    width: max-content;
    animation: marquee var(--speed, 60s) linear infinite;
    will-change: transform;
  }
  .row-1 .track { --speed: 65s; }
  .row-2 .track { --speed: 85s; animation-direction: reverse; } /* slight visual desync */
  .row-3 .track { --speed: 75s; }

  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .marquee:hover .track { animation-play-state: paused; }

  @media (prefers-reduced-motion: reduce) {
    .track { animation: none; }
  }

  /* === Hex tile === */
  .hex {
    flex: 0 0 auto;
    width: var(--hex-w);
    height: var(--hex-h);
    background: white;
    clip-path: var(--hex-pointy-top);
    display: grid;
    place-items: center;
    position: relative;
  }
  /* faint cobalt outline via inset shadow inside the clip */
  .hex::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--c-cobalt-50);
    clip-path: var(--hex-pointy-top);
    z-index: 0;
  }
  .hex::after {
    content: "";
    position: absolute; inset: 1.5px;
    background: white;
    clip-path: var(--hex-pointy-top);
    z-index: 1;
  }
  .hex img {
    position: relative;
    z-index: 2;
    max-width: 60%;
    max-height: 50%;
    object-fit: contain;
    filter: grayscale(1) opacity(0.55);
    transition: filter 200ms ease;
  }
  .hex:hover img,
  .hex:focus-within img {
    filter: grayscale(0) opacity(1);
  }

  /* Mobile: collapse to one lane */
  @media (max-width: 720px) {
    body { padding: 40px 16px; }
    .clients-section h2 { font-size: 36px; }
    .marquee { --hex-w: 88px; --hex-h: 101.6px; --hex-overlap: 25.4px; --gap: 10px; }
    .row-2, .row-3 { display: none; }
  }
