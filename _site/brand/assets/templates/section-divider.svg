<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 148" width="210mm" height="148mm" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Section divider, A5 landscape">
  <title>Section divider · landscape</title>
  <rect x="0" y="0" width="210" height="148" fill="#0A172F"/>
  <!-- Background hex pattern -->
  <g fill="#FFFFFF" fill-opacity="0.05">
    <polygon points="170,30 195,44 195,72 170,86 145,72 145,44"/>
    <polygon points="40,90 55,99 55,117 40,126 25,117 25,99"/>
  </g>
  <!-- Big chapter number -->
  <text x="20" y="98" font-family="IBM Plex Mono, monospace" font-size="64" font-weight="500" fill="#F36C21" letter-spacing="-0.04em">02</text>
  <!-- Section title -->
  <text x="20" y="120" font-family="Figtree, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" letter-spacing="-0.01em">{{ Section title }}</text>
  <text x="20" y="135" font-family="Figtree, system-ui, sans-serif" font-size="9" fill="#FFFFFF" fill-opacity="0.6">{{ Optional one-line lede }}</text>
</svg>
