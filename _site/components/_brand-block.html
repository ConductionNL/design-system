<!doctype html>
<html lang="en">
<body>
<!--
  Brand block — empty logo spacer + Conduction wordmark.

  The .logo span is a 13.86x16mm transparent placeholder; the visible
  Conduction mark is drawn by the page's honeycomb watermark SVG at
  the same coordinates (the watermark grid has a hex slot centred on
  the brand-block logo position).

  Documents using this partial must:
    - reference a watermark SVG that draws a logo cell at (cx_brand,
      cy_brand) matching where the brand block is positioned;
    - include preview/include.js so the partial is loaded at run time;
    - style the wordmark to taste — the partial only carries the
      structural .brand / .logo / .word classes.
-->
<div class="brand">
  <span class="logo" aria-hidden="true"></span>
  <span class="word">Conduction</span>
</div>
</body>
</html>
