<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Top navbar, ConNext Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { margin: 0; font-family: var(--conduction-typography-font-family-body); }

  /* ---- Top nav ---- */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 56px;
    border-bottom: 1px solid var(--c-cobalt-100);
  }
  .nav .left { display: flex; align-items: center; gap: 44px; }
  .wm { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--c-blue-cobalt); }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    color: var(--c-cobalt-700); text-decoration: none;
    font-size: 14px; font-weight: 500;
  }
  .nav-links a:hover, .nav-links a.current { color: var(--c-orange-knvb); }
  .nav-links a.current { font-weight: 600; }
  .nav .nav-ctas { display: flex; align-items: center; gap: 12px; }
  .nav .ghost { color: var(--c-cobalt-700); text-decoration: none; font-size: 14px; font-weight: 500; }
  .nav .cta { background: var(--c-blue-cobalt); color: white; padding: 9px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; text-decoration: none; }
  .nav .cta:hover { background: var(--c-cobalt-700); }
</style>
</head>
<body>

<nav class="nav">
  <div class="left">
    <a href="landing.html" class="wm" style="text-decoration:none">Con<span class="next-blue">Next</span></a>
    <div class="nav-links">
      <a href="apps-catalog.html" data-section="apps">Apps</a>
      <a href="solutions-catalog.html" data-section="solutions">Solutions</a>
      <a href="#" data-section="docs">Docs</a>
      <a href="support.html" data-section="support">Support</a>
      <a href="about.html" data-section="about">About</a>
    </div>
  </div>
  <div class="nav-ctas">
    <a href="#" class="ghost">Demo</a>
    <a href="#" class="cta">Install →</a>
  </div>
</nav>

<!--
  Pages set <body data-current="apps|solutions|docs|support|about"> and include.js
  will add the .current class to the matching link after the navbar is injected.
-->

</body>
</html>
