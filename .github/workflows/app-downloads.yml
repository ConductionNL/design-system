name: App Downloads

# Refreshes data/app-downloads.json with GitHub release-asset download counts
# and Nextcloud app store metadata for every ConductionNL app.
# Cron is UTC; 07:00 UTC = 09:00 Amsterdam (CEST) / 08:00 (CET).

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect download stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/app_downloads.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/app-downloads.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update app download stats"
            git push
          fi
